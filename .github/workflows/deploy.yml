name: Deploy to VPS

# Manual only: you click "Run workflow" in the Actions tab. Nothing ships on its own.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm syncing skills to the VPS'
        required: true
        default: ""

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event.inputs.confirm == 'deploy' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # --- Re-run the contract gate so deploy can never ship a tree CI would reject ---
      - name: Validate contract before shipping
        run: |
          python3 skills/research-lead-finder/scripts/record_lead.py \
            --lead tests/fixtures/good_lead.json --validate-only
          if python3 skills/research-lead-finder/scripts/record_lead.py \
               --lead tests/fixtures/bad_lead.json --validate-only; then
            echo "ERROR: bad lead passed validation; refusing to deploy"; exit 1
          fi

      # --- Discover every skill and the category it must land in (from frontmatter) ---
      - name: Build skills manifest
        run: |
          python3 ci/skills_manifest.py | tee /tmp/skills.tsv
          test -s /tmp/skills.tsv  # fail if no skills discovered

      # --- SSH setup ---
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}

      # --- Sync each skill to <DEPLOY_PATH>/<category>/<name>. DEPLOY_PATH is the
      # --- profile skills ROOT, shared by all skills. --delete is scoped to each
      # --- individual skill folder, so it prunes stale files within a skill but can
      # --- never touch builtins, other categories, config.yaml, or the archive. ---
      - name: Deploy each skill to its category path
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r src cat name; do
            dest="${DEPLOY_PATH}/${cat}/${name}"
            echo "==> ${name} -> ${dest}"
            ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" \
              "${SSH_USER}@${SSH_HOST}" "mkdir -p '${dest}'"
            rsync -az --delete \
              -e "ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22}" \
              --exclude '__pycache__' --exclude '*.pyc' \
              "${src}/" \
              "${SSH_USER}@${SSH_HOST}:${dest}/"
          done < /tmp/skills.tsv
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

      # --- Confirm Hermes discovers every deployed skill ---
      - name: Verify discovery
        run: |
          set -euo pipefail
          listing="$(ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" \
            "${SSH_USER}@${SSH_HOST}" "bash -lc 'researcher skills list'")"
          while IFS=$'\t' read -r src cat name; do
            if echo "$listing" | grep -q "$name"; then
              echo "ok: $name discovered"
            else
              echo "MISSING: $name not in 'researcher skills list'"; exit 1
            fi
          done < /tmp/skills.tsv
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
